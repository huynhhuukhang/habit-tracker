<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion x HabitKit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>HABIT-TRACKER</h2>
            <div class="input-group">
                <input type="text" id="habitInput" placeholder="Tên thói quen...">
                <input type="text" id="descInput" placeholder="Mô tả ngắn gọn...">
                <button class="btn-add" onclick="addHabit()">Mới ＋</button>
            </div>
        </div>
        
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 20%;">Name</th>
                        <th style="width: 20%;">📝 Description</th>
                        <th style="width: 12%;">☑ Done?</th>
                        <th style="width: 8%;">🎯 Do</th>
                        <th style="width: 25%;">📅 History Grid</th>
                        <th style="width: 8%;">🔥 Streak</th>
                        <th style="width: 7%;">🗑️ Delete</th>
                    </tr>
                </thead>
                <tbody id="habitTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
